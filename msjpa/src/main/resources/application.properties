spring.application.name=msjpa


logging.level.org.springframework=INFO
server.port=8091

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:mysql://localhost:3308/rappelfacile
spring.datasource.username=root
spring.datasource.password=root

spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.show-sql=true


spring.profiles.active=prod
#spring.config.import=optional:configserver:http://docker.internal:8071/
spring.config.import=optional:configserver:http://localhost:8071/

cloud.consul.host=localhost
cloud.consul.port=8500
cloud.consul.discovery.enabled=true
cloud.consul.discovery.health-check-interval=15s