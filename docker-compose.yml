  consul:
    image: hashicorp/consul:1.17
    container_name: consul
    mem_limit: 500m
    ports:
      - "8500:8500"
    command: "agent -dev -client=0.0.0.0"
    networks:
      - rappel
    healthcheck:
      test: "curl --fail --silent localhost:8500/v1/status/leader | grep . || exit 1"
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    depends_on:
      configserver:
        condition: service_healthy
volumes:
   mysql_data:
networks:
  rappel: