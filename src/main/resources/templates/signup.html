<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="">
    <meta name="author" content="Mark Otto, Jacob Thornton, and Bootstrap contributors">
    <meta name="generator" content="Hugo 0.82.0">
    <title>Register form</title>
    <link href="/css/bootstrap.min.css" rel="stylesheet">
    <link href="/css/style.scss" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container">

    <div class="row justify-content-center mt-5">

        <div class="col-md-6">

            <div class="card shadow p-4">

                <div class="text-center mb-4">
                    <img th:src="@{/images/logo.png}" width="80">
                    <h3 class="mt-3">Créer votre comptet</h3>
                </div>

                <form th:action="@{/signup}" th:object="${signUpForm}" method="POST">

                    <div class="row">

                        <div class="col-md-6 mb-3">

                            <label class="form-label">Nom</label>

                            <input type="text"
                                   th:field="*{nom}"
                                   class="form-control">

                        </div>

                        <div class="col-md-6 mb-3">

                            <label class="form-label">Prenom</label>

                            <input type="text"
                                   th:field="*{prenom}"
                                   class="form-control">

                        </div>

                    </div>

                    <div class="mb-3">

                        <label class="form-label">Email</label>

                        <input type="text"
                               th:field="*{email}"
                               class="form-control">

                    </div>

                    <div class="mb-3">

                        <label class="form-label">Telephone mobile</label>

                        <input type="text"
                               th:field="*{tel}"
                               class="form-control">

                    </div>

                    <div class="mb-3">

                        <label class="form-label">Photo</label>

                        <input type="text"
                               th:field="*{photo}"
                               class="form-control">

                    </div>

                    <div class="mb-3">

                        <label class="form-label">Mot de passe</label>

                        <input type="password"
                               th:field="*{password}"
                               class="form-control">

                    </div>

                    <div class="mb-3">

                        <label class="form-label">Confirmez votre mot de passe</label>

                        <input type="password"
                               th:field="*{confirmPassword}"
                               class="form-control">

                    </div>

                    <div class="d-grid">

                        <button class="btn btn-success">
                            Valider
                        </button>

                    </div>

                    <div class="text-center mt-3">

                        <a href="/signin">
                            Vous avez deja un compte, identifiez-vous !
                        </a>

                    </div>

                </form>

            </div>

        </div>

    </div>

</div>

</body>
