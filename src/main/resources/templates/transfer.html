<!DOCTYPE html>
<html lang="fr"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="https://www.thymeleaf.org/thymeleaf-extras-springsecurity6">
<head>
    <meta charset="UTF-8">
    <link href="/css/bootstrap.min.css" rel="stylesheet">
    <link href="/css/index.css" rel="stylesheet">
    <title>My transfers</title>
</head>
<body>
<div th:insert="~{header :: header}"></div>

<div class="container mt-5">

    <h2 class="text-center mb-5">My Transfers</h2>
    <div th:if="${success}" class="alert alert-success">
        <span th:text="${success}"></span>
    </div>

    <div th:if="${error}" class="alert alert-danger">
        <span th:text="${error}"></span>
    </div>

    <div class="row g-4 justify-content-center">

        <div class="col-md-5">

            <div class="card text-center p-4 h-100">

                <h4 class="mb-3">Add a contact</h4>

                <p>
                    Add a contact easily<br>
                    All you need is an email<br>
                    Instant & secure
                </p>

                <a href="/addcontact" class="btn btn-primary">
                    Add Contact
                </a>

            </div>

        </div>

        <div class="col-md-5">

            <div class="card text-center p-4 h-100">

                <h4 class="mb-3">Transfer cash</h4>

                <p>
                    Send money instantly<br>
                    Anywhere in the world<br>
                    Fully secured
                </p>

                <a href="/contacttransfer" class="btn btn-success">
                    Send Money
                </a>

            </div>

        </div>

    </div>
    <div class="card p-4 mt-4">
        <h4>Historique des transactions</h4>

        <table>
            <thead>
            <tr>
                <th>Date</th>
                <th>Contact</th>
                <th>Type</th>
                <th>Montant</th>
            </tr>
            </thead>

            <tbody>
            <tr th:each="t : ${transfers}">

                <!-- Date -->
                <td th:text="${#temporals.format(t.date, 'dd/MM/yyyy HH:mm')}"></td>

                <!-- Contact -->
                <td>
                <span th:if="${t.from.id == currentUser.id}"
                      th:text="${t.to.email}"></span>

                    <span th:if="${t.to.id == currentUser.id}"
                          th:text="${t.from.email}"></span>
                </td>

                <!-- Type -->
                <td>
                <span th:if="${t.from.id == currentUser.id}"
                      class="badge bg-danger">Envoyé</span>

                    <span th:if="${t.to.id == currentUser.id}"
                          class="badge bg-success">Reçu</span>
                </td>

                <!-- Montant -->
                <td>
                    <!-- Expéditeur : montrer montant + frais -->
                    <span th:if="${t.from.id == currentUser.id}"
                          class="text-danger"
                          th:text="'- ' + ${t.amountAfterFee} + ' €'"></span>

                    <!-- Destinataire : montrer seulement le montant reçu (sans frais) -->
                    <span th:if="${t.to.id == currentUser.id}"
                          class="text-success"
                          th:text="'+ ' + ${t.amountBeforeFee} + ' €'"></span>
                </td>

            </tr>
            </tbody>
        </table>

        <div th:if="${#lists.isEmpty(transfers)}" class="text-center mt-3">
            <p>Aucune transaction</p>
        </div>
    </div>

</div>

<div th:insert="~{footer :: footer}"></div>
