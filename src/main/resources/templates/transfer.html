<!DOCTYPE html>
<html lang="fr"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="https://www.thymeleaf.org/thymeleaf-extras-springsecurity6">
<head>
    <meta charset="UTF-8">
    <link href="/css/bootstrap.min.css" rel="stylesheet">
    <link href="/css/index.css" rel="stylesheet">
    <title>My transfers</title>
</head>
<body>
<div th:insert="~{header :: header}"></div>

<div class="container mt-5">

    <h2 class="text-center mb-5">My Transfers</h2>

    <div class="row g-4 justify-content-center">

        <div class="col-md-5">

            <div class="card text-center p-4 h-100">

                <h4 class="mb-3">Add a contact</h4>

                <p>
                    Add a contact easily<br>
                    All you need is an email<br>
                    Instant & secure
                </p>

                <a href="/addcontact" class="btn btn-primary">
                    Add Contact
                </a>

            </div>

        </div>

        <div class="col-md-5">

            <div class="card text-center p-4 h-100">

                <h4 class="mb-3">Transfer cash</h4>

                <p>
                    Send money instantly<br>
                    Anywhere in the world<br>
                    Fully secured
                </p>

                <a href="/contacttransfer" class="btn btn-success">
                    Send Money
                </a>

            </div>

        </div>

    </div>
    <h3>Mes transferts récents</h3>
    <table>
        <thead>
        <tr>
            <th>Date</th>
            <th>Destinataire</th>
            <th>Montant avant frais</th>
            <th>Montant après frais</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="t : ${transfers}">
            <td th:text="${t.date}"></td>
            <td th:text="${t.to.email}"></td>
            <td th:text="${t.amountBeforeFee}"></td>
            <td th:text="${t.amountAfterFee}"></td>
        </tr>
        </tbody>
    </table>

</div>

<div th:insert="~{footer :: footer}"></div>
