<body>
<div class="Container">
    <header class="HeaderBox">
        <img class="HeaderBox-logo" src="images/logo.png" alt="Logo Rappel Facile">
        <h1 class="HeaderBox-title">Rappel Facile</h1>
        <div class="NavBox">
            <i class="fa-solid fa-bars NavBox-burger"></i>
            <i class="fa-solid fa-close NavBox-close"></i>
            <div class="NavBox-toggleMenu">

                <nav class="NavBox-menuPrincipal">
                    <a  class="NavBox-menuPrincipal-link" href="">Vos rendez-vous</a>
                    <a href=""  class="NavBox-menuPrincipal-link">Vos prestataires</a>
                    <a href="/charts"  class="NavBox-menuPrincipal-link">Vos statistiques</a>
                </nav>
                <div class="NavBox-user">
                    <img class="NavBox-user-avatar"
                         th:src="@{'/images/' + ${currentUser.photo}}"
                         alt="Avatar utilisateur">
                    <p th:text="${currentUser.prenom}">Prenom</p>
                    <form th:action="@{/logout}" method="post" class="NavBox-user-logout">
                        <button type="submit" class="NavBox-user-logoutBtn">
                            log out
                        </button>
                    </form>
                </div>
                <nav class="NavBox-menuSecondaire">
                    <a class="NavBox-menuSecondaire-link" href="">Contact</a>
                    <a class="NavBox-menuSecondaire-link" href="">Cgu</a>
                    <a class="NavBox-menuSecondaire-link" href="">Rgpd</a>
                </nav>
            </div>
        </div>
    </header>
