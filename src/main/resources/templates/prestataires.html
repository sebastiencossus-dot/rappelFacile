<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <link href="/css/bootstrap.min.css" rel="stylesheet">
    <link href="/css/style.css" rel="stylesheet">
    <title>Prestataires</title>
</head>

<body>

<div th:insert="~{header :: header}"></div>

<main class="ContentBox">

    <h2 class="ContentBox-title">Prestataires</h2>

    <!-- FILTRE CATEGORIES -->
    <div id="categories" class="categories-bar">
        <button class="cat-btn active" onclick="filtrer('tous')">Tous</button>
        <button th:each="cat : ${categories}"
                class="cat-btn"
                th:text="${cat}"
                th:attr="onclick='filtrer(' + '\'' + ${cat} + '\'' + ')'">
        </button>
    </div>

    <!-- LISTE PRESTATAIRES -->
    <div id="liste" class="ContentBox-rdvBox">
        <div th:each="p : ${prestataires}"
             class="presta-card ContentBox2-detailRdv-card fond1"
             th:attr="data-professions=${#strings.listJoin(p.professions, ',')},
              data-categories=${p.categories != null ? #strings.listJoin(p.categories, ',') : ''}">

            <p class="presta-nom" th:text="${p.nom} + ' ' + ${p.prenom}"></p>

            <div class="presta-tags">
                <span th:each="prof : ${p.professions}"
                      class="presta-tag"
                      th:text="${prof}">
                </span>
            </div>

            <!-- Données cachées pour la fiche -->
            <span class="presta-data" style="display:none"
                  th:attr="
                    data-id=${p.id},
                    data-nom=${p.nom},
                    data-prenom=${p.prenom},
                    data-professions=${#strings.listJoin(p.professions, ',')},
                    data-adresses=${p.adresses != null ? #strings.listJoin(p.adresses.![rue + ' ' + numero + ', ' + ville + ' ' + codepostal], '|') : ''}">
            </span>

            <button class="ContentBox2-detailRdv-btn btn2"
                    onclick="ouvrirFiche(this)">
                Voir la fiche
            </button>
        </div>
    </div>

    <!-- MESSAGE AUCUN RÉSULTAT -->
    <p id="aucun-resultat" style="display:none; text-align:center; margin-top:2rem;">
        Aucun prestataire dans cette catégorie.
    </p>

    <!-- MODAL FICHE DETAIL -->
    <div id="modal-overlay" style="display:none" onclick="fermerFiche(event)">
        <div id="modal-fiche" class="ContentBox2-detailRdv-card fond2">

            <button id="modal-close" onclick="fermerFiche()">✕</button>

            <h3 id="fiche-nom"></h3>

            <div class="fiche-section">
                <p><i class="fa-solid fa-briefcase"></i> <strong>Professions</strong></p>
                <div id="fiche-professions"></div>
            </div>

            <div class="fiche-section">
                <p><i class="fa-solid fa-location-dot"></i> <strong>Adresses</strong></p>
                <div id="fiche-adresses"></div>
            </div>

            <div class="fiche-actions">
                <a id="fiche-edit-link" href="#" class="ContentBox2-detailRdv-btn btn2">
                    Modifier
                </a>
            </div>
        </div>
    </div>

</main>

<div th:insert="~{footer :: footer}"></div>

<script src="https://kit.fontawesome.com/0aa6008ea0.js" crossorigin="anonymous"></script>

<script>
    // --- FILTRE PAR CATEGORIE ---
    function filtrer(categories) {
        const cards = document.querySelectorAll('.presta-card');
        let visible = 0;

        cards.forEach(card => {
            const profs = card.getAttribute('data-categories') || '';
            const match = categories === 'tous' || profs.split(',').includes(categories);
            card.style.display = match ? 'flex' : 'none';
            if (match) visible++;
        });

        document.getElementById('aucun-resultat').style.display = visible === 0 ? 'block' : 'none';

        // Bouton actif
        document.querySelectorAll('.cat-btn').forEach(btn => btn.classList.remove('active'));
        event.target.classList.add('active');
    }

    // --- OUVRIR FICHE ---
    function ouvrirFiche(btn) {
        const data = btn.previousElementSibling;

        const id       = data.getAttribute('data-id');
        const nom      = data.getAttribute('data-nom');
        const prenom   = data.getAttribute('data-prenom');
        const profs    = data.getAttribute('data-professions');
        const adresses = data.getAttribute('data-adresses');

        document.getElementById('fiche-nom').textContent = nom + ' ' + prenom;

        // Professions
        const profsDiv = document.getElementById('fiche-professions');
        profsDiv.innerHTML = profs
            ? profs.split(',').map(p => `<span class="presta-tag">${p.trim()}</span>`).join('')
            : '<em>Aucune</em>';

        // Adresses
        const adrDiv = document.getElementById('fiche-adresses');
        adrDiv.innerHTML = adresses
            ? adresses.split('|').map(a => `<p>${a.trim()}</p>`).join('')
            : '<em>Aucune adresse renseignée</em>';

        // Lien modifier
        document.getElementById('fiche-edit-link').href = '/prestataires/edit/' + id;

        document.getElementById('modal-overlay').style.display = 'flex';
    }

    // --- FERMER FICHE ---
    function fermerFiche(event) {
        if (!event || event.target === document.getElementById('modal-overlay') || event.currentTarget.id === 'modal-close') {
            document.getElementById('modal-overlay').style.display = 'none';
        }
    }
</script>

<style>
    .categories-bar {
        display: flex;
        flex-wrap: wrap;
        gap: 0.5rem;
        margin-bottom: 1.5rem;
    }

    .cat-btn {
        padding: 0.4rem 1rem;
        border: 2px solid var(--color-primary, #4a90e2);
        border-radius: 20px;
        background: white;
        cursor: pointer;
        font-size: 0.9rem;
        transition: all 0.2s;
    }

    .cat-btn.active, .cat-btn:hover {
        background: var(--color-primary, #4a90e2);
        color: white;
    }

    .presta-card {
        flex-direction: column;
        gap: 0.5rem;
        cursor: default;
    }

    .presta-nom {
        font-weight: bold;
        font-size: 1.1rem;
        margin: 0;
    }

    .presta-tags {
        display: flex;
        flex-wrap: wrap;
        gap: 0.3rem;
        padding-left: 10px;
    }

    .presta-tag {
        background: #e8f0fe;
        color: #1a73e8;
        border-radius: 12px;
        padding: 0.2rem 0.7rem;
        font-size: 0.8rem;
    }

    .fiche-section {
        margin: 1rem 0;
    }

    .fiche-actions {
        margin-top: 1.5rem;
        text-align: right;
    }

    /* MODAL */
    #modal-overlay {
        position: fixed;
        inset: 0;
        background: rgba(0,0,0,0.5);
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 1000;
    }

    #modal-fiche {
        position: relative;
        width: 90%;
        max-width: 500px;
        max-height: 80vh;
        overflow-y: auto;
        padding: 2rem;
    }

    #modal-close {
        position: absolute;
        top: 0.8rem;
        right: 1rem;
        background: none;
        border: none;
        font-size: 1.3rem;
        cursor: pointer;
        color: #666;
    }
</style>

</body>
</html>
