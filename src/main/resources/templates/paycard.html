<!DOCTYPE html>
<html lang="fr"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="https://www.thymeleaf.org/thymeleaf-extras-springsecurity6">
<head>
    <meta charset="UTF-8">
    <link href="/css/bootstrap.min.css" rel="stylesheet">
    <link href="/css/index.css" rel="stylesheet">
    <title>Credit your account</title>
</head>
<body>
<div th:insert="~{header :: header}"></div>
<div class="card shadow-sm p-4">
    <h3 class="text-center mb-4">Paiement sécurisé</h3>
    <form th:action="@{/paycard}" method="post">
        <!-- Montant -->
        <div class="mb-3">
            <label for="amount" class="form-label">Montant (€)</label>
            <input type="number" class="form-control" id="amount" name="amount" placeholder="0,00" min="0.01" step="0.01" required>
        </div>

        <!-- Nom du titulaire -->
        <div class="mb-3">
            <label for="cardName" class="form-label">Nom sur la carte</label>
            <input type="text" class="form-control" id="cardName" name="cardName" placeholder="Jean Dupont">
        </div>

        <!-- Numéro de carte -->
        <div class="mb-3">
            <label for="cardNumber" class="form-label">Numéro de carte</label>
            <input type="text" class="form-control" id="cardNumber" name="cardNumber" placeholder="1234 5678 9012 3456" maxlength="19">
        </div>

        <div class="row">
            <!-- Date d'expiration -->
            <div class="col-md-6 mb-3">
                <label for="expiryDate" class="form-label">Date d'expiration</label>
                <input type="text" class="form-control" id="expiryDate" name="expiryDate" placeholder="MM/AA" maxlength="5">
            </div>

            <!-- CVV -->
            <div class="col-md-6 mb-3">
                <label for="cvv" class="form-label">CVV</label>
                <input type="password" class="form-control" id="cvv" name="cvv" placeholder="123" maxlength="4">
            </div>
        </div>

        <!-- Bouton -->
        <div class="d-grid mt-3">
            <button type="submit" class="btn btn-primary btn-lg">Payer</button>
        </div>
        <div class="card-footer text-muted text-center">
            Connecté en tant que <span th:text="${currentUser.email}"></span>
        </div>
        <p class="text-muted text-center mt-3">
            Paiement sécurisé par Flash Cash
        </p>
    </form>
</div>
<div th:insert="~{footer :: footer}"></div>
