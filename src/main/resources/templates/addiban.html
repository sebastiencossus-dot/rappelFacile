<!DOCTYPE html>
<html lang="fr"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="https://www.thymeleaf.org/thymeleaf-extras-springsecurity6">
<head>
    <meta charset="UTF-8">
    <link href="/css/bootstrap.min.css" rel="stylesheet">
    <link href="/css/index.css" rel="stylesheet">
    <title>Add iban</title>
</head>
<body>
<div th:insert="~{header :: header}"></div>

<div class="container mt-5">

    <div class="row g-4">

        <div class="col-md-6">

            <div class="card p-4">

                <h4 class="mb-3">Account details</h4>

                <p><strong>IBAN :</strong>
                    <span th:text="${account.iban}"></span>
                </p>

                <p><strong>Balance :</strong>
                    <span th:text="${account.amount}"></span> €
                </p>

            </div>

        </div>

        <div class="col-md-6">

            <div class="card p-4">

                <h4 class="mb-3">Add or update your IBAN</h4>

                <form th:action="@{/account/iban}" method="post">

                    <div class="mb-3">
                        <label class="form-label">IBAN</label>

                        <input type="text"
                               class="form-control"
                               name="iban"
                               th:value="${account.iban}"
                               required>
                    </div>

                    <div class="d-grid">
                        <button class="btn btn-primary">
                            Save
                        </button>
                    </div>

                </form>

                <div th:if="${successIban}" class="alert alert-success mt-3">
                    IBAN enregistré avec succès !
                </div>

            </div>

        </div>

    </div>

</div>

<div th:insert="~{footer :: footer}"></div>
