<!DOCTYPE html>
<html lang="fr"
      xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <link href="/css/bootstrap.min.css" rel="stylesheet">
    <link href="/css/index.css" rel="stylesheet">
    <title>Transfer to contact</title>
</head>

<body>

<div th:insert="~{header :: header}"></div>

<div class="container mt-5">

    <div class="row justify-content-center">

        <div class="col-md-6">

            <div class="card p-4">

                <h3 class="mb-4 text-center">Send money</h3>

                <form th:action="@{/contacttransfer}" method="post">

                    <input type="hidden"
                           th:name="${_csrf.parameterName}"
                           th:value="${_csrf.token}" />

                    <div class="mb-3">

                        <label class="form-label">Select contact</label>

                        <select name="contactId" class="form-control">

                            <option th:each="contact : ${contacts}"
                                    th:value="${contact.user2.id}"
                                    th:text="${contact.user2.email}">
                            </option>

                        </select>

                    </div>

                    <div class="mb-3">

                        <label class="form-label">Amount (€)</label>

                        <input type="number"
                               class="form-control"
                               name="amount"
                               step="0.01"
                               required>

                    </div>

                    <div class="d-grid">

                        <button class="btn btn-success">
                            Send money
                        </button>

                    </div>

                </form>

                <p class="text-danger mt-3"
                   th:if="${error}"
                   th:text="${error}"></p>

                <p class="text-success mt-3"
                   th:if="${message}"
                   th:text="${message}"></p>

            </div>

        </div>

    </div>
    <h3>Mes transferts récents</h3>
    <table>
        <thead>
        <tr>
            <th>Date</th>
            <th>Destinataire</th>
            <th>Montant avant frais</th>
            <th>Montant après frais</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="t : ${transfers}">
            <td th:text="${t.date}"></td>
            <td th:text="${t.to.email}"></td>
            <td th:text="${t.amountBeforeFee}"></td>
            <td th:text="${t.amountAfterFee}"></td>
        </tr>
        </tbody>
    </table>

</div>

<div th:insert="~{footer :: footer}"></div>

</body>
</html>
