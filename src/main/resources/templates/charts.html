<!DOCTYPE html>
<html lang="fr"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="https://www.thymeleaf.org/thymeleaf-extras-springsecurity6">
<head>
    <meta charset="UTF-8">
    <link href="/css/bootstrap.min.css" rel="stylesheet">
    <link href="/css/style.css" rel="stylesheet">
    <title>Rappel Facile</title>
</head>
<div th:insert="~{header :: header}"></div>

<main class="ContentBox">
    <div style="width: 85%; margin: auto">
    <pre>
    sante = [[${sante}]]
    beaute = [[${beaute}]]
    soin = [[${soin}]]
    administratif = [[${administratif}]]
</pre>
<canvas id="myChart"></canvas>
</div>
</main>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>


<script th:inline="javascript">

    const labels = /*[[${labels}]]*/ [];

const sante = /*[[${sante}]]*/ [];
const beaute = /*[[${beaute}]]*/ [];
const soin = /*[[${soin}]]*/ [];
const administratif = /*[[${administratif}]]*/ [];

console.log("labels:", labels);
console.log("sante:", sante);
console.log("beaute:", beaute);
console.log("soin:", soin);
console.log("administratif:", administratif);

const ctx = document.getElementById('myChart');

new Chart(ctx, {
    type: 'bar',
    data: {
        labels: labels,
        datasets: [
            {
                label: 'Santé',
                data: sante
            },
            {
                label: 'Beauté',
                data: beaute
            },
            {
                label: 'Soin',
                data: soin
            },
            {
                label: 'Administratif',
                data: administratif
            }
        ]
    },
    options: {
        responsive: true,
        plugins: {
            legend: {
                position: 'top'
            },
            tooltip: {
                mode: 'index',
                intersect: false
            }
        },
        scales: {
            x: {
                stacked: false
            },
            y: {
                beginAtZero: true
            }
        }
    }
});

</script>
